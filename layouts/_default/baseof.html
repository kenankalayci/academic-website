<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="{{ .Site.Params.description }}" />
    <title>{{ if .Title }}{{ .Title }} | {{ end }}{{ .Site.Title }}</title>
    <link rel="canonical" href="{{ .Permalink }}" />
    <link rel="stylesheet" href="{{ "/css/site.css" | relURL }}" />
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header">
        <h1 class="site-title"><a href="{{ "/" | relURL }}">{{ .Site.Title }}</a></h1>
        <p class="site-tagline">{{ .Site.Params.description }}</p>
        <nav class="site-nav" aria-label="Main navigation">
          <ul>
            {{ range .Site.Menus.main }}
              {{ $active := or ($.IsMenuCurrent "main" .) ($.HasMenuCurrent "main" .) (eq $.RelPermalink .URL) }}
              <li>
                <a href="{{ .URL | relURL }}" class="{{ if $active }}active{{ end }}">{{ .Name }}</a>
              </li>
            {{ end }}
          </ul>
        </nav>
      </header>
      <main>
        {{ block "main" . }}{{ end }}
      </main>
      <footer class="site-footer">
        <p>Copyright {{ now.Year }} {{ .Site.Title }}</p>
      </footer>
    </div>
  </body>
</html>
